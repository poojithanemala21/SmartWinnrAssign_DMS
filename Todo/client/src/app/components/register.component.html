<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 32px;">Join the next generation of document management</p>

        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" [(ngModel)]="username" class="form-control" placeholder="sri_dev">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" [(ngModel)]="email" class="form-control" placeholder="sri@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" [(ngModel)]="password" class="form-control" placeholder="••••••••">
        </div>

        <button (click)="onSubmit()" class="btn btn-primary" [disabled]="loading"
            style="width: 100%; margin-top: 12px;">
            <span *ngIf="loading">Creating account...</span>
            <span *ngIf="!loading">Get Started</span>
        </button>

        <div style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
            Already registered? <a routerLink="/login"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in to your workspace</a>
        </div>
    </div>
</div>
